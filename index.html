<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>משחק הכוסות</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;700;900&display=swap');

    :root {
      --gold: #f5c518;
      --pink: #ff6b9d;
      --purple: #7c3aed;
      --dark: #1a1a2e;
      --card: #16213e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--dark);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255,107,157,0.15) 0%, transparent 60%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Heebo', sans-serif;
      direction: rtl; padding: 20px;
      overflow-x: hidden;
    }

    /* ─── LOBBY ─── */
    #lobby {
      background: var(--card);
      border-radius: 28px; padding: 40px 32px;
      box-shadow: 0 0 60px rgba(124,58,237,0.3);
      border: 1px solid rgba(124,58,237,0.3);
      text-align: center; max-width: 340px; width: 100%;
    }
    .lobby-icon { font-size: 3rem; margin-bottom: 12px; }
    #lobby h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem; color: var(--gold);
      margin-bottom: 6px; letter-spacing: 0.02em;
    }
    .lobby-sub { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-bottom: 32px; }

    .lobby-btn {
      width: 100%; padding: 15px; border-radius: 20px; border: none;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      font-family: 'Heebo', sans-serif; margin-bottom: 12px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .lobby-btn:hover { transform: translateY(-2px); }
    .btn-invite {
      background: linear-gradient(135deg, var(--purple), #a855f7);
      color: white; box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }
    .btn-invite:hover { box-shadow: 0 8px 30px rgba(124,58,237,0.5); }

    .divider { display: flex; align-items: center; gap: 10px; margin: 4px 0 16px; color: rgba(255,255,255,0.2); font-size: 0.8rem; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.1); }

    .code-input {
      width: 100%; padding: 14px; border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      font-size: 1.4rem; font-weight: 700; text-align: center;
      letter-spacing: 0.2em; font-family: 'Heebo', sans-serif;
      outline: none; direction: ltr; color: white;
      transition: border-color 0.15s; margin-bottom: 10px;
    }
    .code-input:focus { border-color: var(--gold); }
    .code-input::placeholder { color: rgba(255,255,255,0.2); letter-spacing: 0.1em; font-size: 1rem; }
    .btn-join {
      width: 100%; background: linear-gradient(135deg, var(--gold), #e6a800);
      color: var(--dark); border: none; border-radius: 16px;
      padding: 14px; font-size: 1rem; font-weight: 900;
      cursor: pointer; font-family: 'Heebo', sans-serif;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(245,197,24,0.3);
    }
    .btn-join:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(245,197,24,0.4); }
    #lobby-err { color: var(--pink); font-size: 0.8rem; margin-top: 10px; min-height: 18px; }

    /* ─── WAITING ─── */
    #waiting {
      background: var(--card); border-radius: 28px; padding: 40px 32px;
      box-shadow: 0 0 60px rgba(124,58,237,0.3);
      border: 1px solid rgba(124,58,237,0.3);
      text-align: center; max-width: 340px; width: 100%; display: none;
    }
    #waiting h2 { color: white; font-size: 1.2rem; margin-bottom: 8px; }
    .waiting-hint { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    .room-code-display {
      font-family: 'Fredoka One', cursive;
      font-size: 3.5rem; color: var(--gold);
      direction: ltr; margin: 16px 0;
      text-shadow: 0 0 30px rgba(245,197,24,0.5);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .leave-btn {
      background: none; border: none; color: rgba(255,255,255,0.3);
      font-size: 0.8rem; cursor: pointer; font-family: inherit;
      text-decoration: underline; margin-top: 16px; display: block;
    }
    .leave-btn:hover { color: rgba(255,255,255,0.6); }

    /* ─── GAME ─── */
    #game { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 420px; }

    .game-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem; color: var(--gold);
      text-align: center; margin-bottom: 4px;
      text-shadow: 0 0 20px rgba(245,197,24,0.4);
    }
    .room-badge { font-size: 0.75rem; color: rgba(255,255,255,0.3); margin-bottom: 16px; text-align: center; }
    .room-badge span { color: var(--gold); font-weight: 700; direction: ltr; display: inline-block; }

    /* Scoreboard */
    .scoreboard {
      display: flex; gap: 16px; margin-bottom: 16px; width: 100%;
    }
    .score-card {
      flex: 1; background: var(--card); border-radius: 16px;
      padding: 12px; text-align: center;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .score-card.active-turn { border-color: var(--gold); box-shadow: 0 0 16px rgba(245,197,24,0.2); }
    .score-role { font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-bottom: 2px; }
    .score-num { font-family: 'Fredoka One', cursive; font-size: 1.8rem; color: white; line-height: 1; }
    .score-tries { font-size: 0.65rem; color: rgba(255,255,255,0.3); margin-top: 2px; }

    /* Status */
    .status-area {
      margin-bottom: 16px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
    }
    .status-pill {
      padding: 10px 22px; border-radius: 30px;
      font-size: 0.9rem; font-weight: 700;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .status-win {
      padding: 10px 28px; border-radius: 30px;
      font-size: 1rem; font-weight: 800; color: var(--dark);
      background: linear-gradient(135deg, var(--gold), #e6a800);
      box-shadow: 0 4px 20px rgba(245,197,24,0.4);
      animation: pop 0.4s cubic-bezier(.36,2,.4,.8);
    }

    /* Cups area */
    .cups-area {
      display: flex; gap: 16px; justify-content: center;
      margin-bottom: 20px; width: 100%;
      perspective: 600px;
    }

    .cup-wrapper {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      flex: 1;
    }

    .cup {
      width: 90px; height: 90px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.15);
      background: linear-gradient(135deg, #2d2d5e, #1a1a3e);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.8rem; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      position: relative; overflow: hidden;
      user-select: none;
    }
    .cup::before {
      content: '?';
      font-family: 'Fredoka One', cursive;
      font-size: 2rem; color: rgba(255,255,255,0.2);
    }
    .cup.clickable:hover {
      transform: translateY(-6px) scale(1.05);
      border-color: var(--gold);
      box-shadow: 0 12px 30px rgba(245,197,24,0.3);
    }
    .cup.clickable:hover::before { color: rgba(255,255,255,0.5); }
    .cup.revealed {
      cursor: default;
      border-color: rgba(255,255,255,0.3);
    }
    .cup.revealed::before { display: none; }
    .cup.revealed img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
    }
    .cup.empty-revealed {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.08);
      cursor: default;
    }
    .cup.empty-revealed::before { content: '—'; color: rgba(255,255,255,0.15); font-size: 1.5rem; }
    .cup.winner-cup {
      border-color: var(--gold) !important;
      box-shadow: 0 0 30px rgba(245,197,24,0.5) !important;
      animation: pulse-gold 1s ease infinite;
    }
    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 0 20px rgba(245,197,24,0.4); }
      50% { box-shadow: 0 0 40px rgba(245,197,24,0.8); }
    }

    .cup-points {
      font-size: 0.7rem; color: rgba(255,255,255,0.3);
      font-weight: 700; text-align: center;
    }

    /* Shuffle animation */
    @keyframes shuffleLeft  { 0%{transform:translateX(0)} 50%{transform:translateX(-80px)} 100%{transform:translateX(0)} }
    @keyframes shuffleRight { 0%{transform:translateX(0)} 50%{transform:translateX(80px)}  100%{transform:translateX(0)} }
    @keyframes shuffleCross { 0%{transform:translateX(0)} 25%{transform:translateX(60px)} 75%{transform:translateX(-60px)} 100%{transform:translateX(0)} }
    .shuffle-left  { animation: shuffleLeft  0.5s ease-in-out; }
    .shuffle-right { animation: shuffleRight 0.5s ease-in-out; }
    .shuffle-cross { animation: shuffleCross 0.5s ease-in-out; }

    /* Buttons */
    .action-btn {
      background: linear-gradient(135deg, var(--purple), #a855f7);
      color: white; border: none; border-radius: 30px;
      padding: 13px 36px; font-size: 1rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      margin-bottom: 10px;
    }
    .action-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,58,237,0.5); }

    /* Emoji bar */
    .emoji-bar {
      display: flex; gap: 6px; justify-content: center;
      flex-wrap: wrap; margin-bottom: 12px;
    }
    .emoji-btn {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, background 0.15s;
    }
    .emoji-btn:hover { transform: scale(1.2); background: rgba(255,255,255,0.12); }
    .emoji-btn:active { transform: scale(0.9); }

    .emoji-bubble {
      position: fixed; bottom: 80px; font-size: 3rem; z-index: 999;
      animation: bubbleUp 2.5s ease-out forwards; pointer-events: none;
    }
    .emoji-bubble.mine { right: 30px; }
    .emoji-bubble.theirs { left: 30px; }
    @keyframes bubbleUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      80%  { opacity: 1; transform: translateY(-120px) scale(1.3); }
      100% { opacity: 0; transform: translateY(-160px) scale(0.8); }
    }

    /* Shuffle countdown */
    .shuffle-msg {
      font-size: 1rem; color: var(--gold); font-weight: 700;
      margin-bottom: 8px; min-height: 24px; text-align: center;
    }

    @keyframes pop {
      0% { transform: scale(0.7); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="lobby-icon">🎪</div>
  <h1>משחק הכוסות</h1>
  <div class="lobby-sub">מי מסתתר מתחת?</div>
  <button class="lobby-btn btn-invite" onclick="createRoom()">🤝 צרף חבר</button>
  <div class="divider">או</div>
  <input class="code-input" id="join-code" maxlength="4" placeholder="קוד חדר" oninput="this.value=this.value.replace(/\D/g,'')">
  <button class="btn-join" onclick="joinRoom()">הצטרף</button>
  <div id="lobby-err"></div>
</div>

<!-- WAITING -->
<div id="waiting">
  <h2>ממתין לשחקן שני...</h2>
  <div class="waiting-hint">שלח לחבר את הקוד:</div>
  <div class="room-code-display" id="display-code"></div>
  <div class="waiting-hint">כשהוא יכנס המשחק יתחיל</div>
  <div class="spinner"></div>
  <button class="leave-btn" onclick="leaveRoom()">בטל</button>
</div>

<!-- GAME -->
<div id="game">
  <div class="game-title">🎪 משחק הכוסות</div>
  <div class="room-badge">חדר: <span id="room-badge-code"></span></div>

  <div class="scoreboard">
    <div class="score-card" id="score-card-1">
      <div class="score-role" id="role-label-1">שחקן 1 (🍓)</div>
      <div class="score-num" id="score-1">0</div>
      <div class="score-tries" id="tries-1"></div>
    </div>
    <div class="score-card" id="score-card-2">
      <div class="score-role" id="role-label-2">שחקן 2 (🍋)</div>
      <div class="score-num" id="score-2">0</div>
      <div class="score-tries" id="tries-2"></div>
    </div>
  </div>

  <div class="status-area" id="status-area"></div>
  <div class="shuffle-msg" id="shuffle-msg"></div>

  <div class="cups-area" id="cups-area">
    <div class="cup-wrapper">
      <div class="cup" id="cup-0" onclick="pickCup(0)"></div>
      <div class="cup-points">?</div>
    </div>
    <div class="cup-wrapper">
      <div class="cup" id="cup-1" onclick="pickCup(1)"></div>
      <div class="cup-points">?</div>
    </div>
  </div>

  <button class="action-btn" id="next-btn" onclick="requestNextRound()" style="display:none">▶ סיבוב הבא</button>

  <div class="emoji-bar">
    <button class="emoji-btn" onclick="sendEmoji('😂')">😂</button>
    <button class="emoji-btn" onclick="sendEmoji('🔥')">🔥</button>
    <button class="emoji-btn" onclick="sendEmoji('😤')">😤</button>
    <button class="emoji-btn" onclick="sendEmoji('👏')">👏</button>
    <button class="emoji-btn" onclick="sendEmoji('🤡')">🤡</button>
    <button class="emoji-btn" onclick="sendEmoji('💩')">💩</button>
    <button class="emoji-btn" onclick="sendEmoji('💀')">💀</button>
    <button class="emoji-btn" onclick="sendEmoji('0️⃣')">0️⃣</button>
    <button class="emoji-btn" onclick="sendEmoji('🤣')">🤣</button>
    <button class="emoji-btn" onclick="sendEmoji('😭')">😭</button>
    <button class="emoji-btn" onclick="sendEmoji('🤮')">🤮</button>
    <button class="emoji-btn" onclick="sendEmoji('🫵')">🫵</button>
  </div>
  <button class="leave-btn" onclick="leaveRoom()">עזוב חדר</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, update, remove }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD2SECYc_9V7NDASMzSzf0Se5OL6NyU8wA",
    authDomain: "priel-af970.firebaseapp.com",
    databaseURL: "https://priel-af970-default-rtdb.firebaseio.com",
    projectId: "priel-af970",
    storageBucket: "priel-af970.firebasestorage.app",
    messagingSenderId: "816586982849",
    appId: "1:816586982849:web:b991437452fffae36e5b40"
  };

  const IMAGES = {
    old:   'https://yaronzlot.github.io/cupgame/images/old.jpg',
    mid:   'https://yaronzlot.github.io/cupgame/images/mid.jpg',
    young: 'https://yaronzlot.github.io/cupgame/images/young.jpg',
  };
  const PRIZES = { old: 1, mid: 2, young: 3 };
  const PRIZE_LABELS = { old: '⭐ 1 נקודה', mid: '⭐⭐ 2 נקודות', young: '⭐⭐⭐ 3 נקודות' };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let myRole = null; // 'X' or 'O'
  let roomCode = null;
  let unsubscribe = null;
  let lastScores = { X: 0, O: 0 };
  let lastEmojiTs = 0;
  let isShuffling = false;

  function randomCode() { return Math.floor(1000 + Math.random() * 9000).toString(); }

  function show(id) {
    ['lobby','waiting','game'].forEach(s => {
      const el = document.getElementById(s);
      el.style.display = s === id ? (id === 'game' ? 'flex' : 'block') : 'none';
    });
  }

  function newRoundState() {
    const types = ['old','mid','young'];
    const prize = types[Math.floor(Math.random() * 3)];
    const hiddenCup = Math.floor(Math.random() * 2);
    return {
      prize,
      hiddenCup,
      phase: 'shuffling', // shuffling → picking → revealed
      picks: {},           // { X: cupIndex, O: cupIndex }
      scores: lastScores,
      nextRound: null,
    };
  }

  // ─── Create room ───
  window.createRoom = async function() {
    let code;
    for (let i = 0; i < 10; i++) {
      code = randomCode();
      const snap = await get(ref(db, `rooms2/${code}`));
      if (!snap.exists()) break;
    }
    const round = newRoundState();
    round.scores = { X: 0, O: 0 };
    await set(ref(db, `rooms2/${code}`), { status: 'waiting', round, emoji: null });
    roomCode = code;
    myRole = 'X';
    document.getElementById('display-code').textContent = code;
    show('waiting');
    listenRoom();

    const url = `${location.origin}${location.pathname}?room=${code}`;
    const text = `בוא נשחק משחק הכוסות! לחץ להצטרף: ${url}`;
    if (navigator.share) {
      try { await navigator.share({ title: 'משחק הכוסות', text }); } catch(e) {}
    } else {
      await navigator.clipboard.writeText(text);
      alert('הלינק הועתק! שלח לחבר 📋');
    }
  };

  // ─── Join room ───
  window.joinRoom = async function() {
    const code = document.getElementById('join-code').value.trim();
    const errEl = document.getElementById('lobby-err');
    if (code.length !== 4) { errEl.textContent = 'קוד חייב להיות 4 ספרות'; return; }
    const snap = await get(ref(db, `rooms2/${code}`));
    if (!snap.exists()) { errEl.textContent = 'חדר לא נמצא 🤷'; return; }
    if (snap.val().status !== 'waiting') { errEl.textContent = 'החדר כבר מלא'; return; }
    errEl.textContent = '';
    await update(ref(db, `rooms2/${code}`), { status: 'playing' });
    roomCode = code;
    myRole = 'O';
    show('game');
    initGameUI();
    listenRoom();
  };

  function listenRoom() {
    if (unsubscribe) unsubscribe();
    unsubscribe = onValue(ref(db, `rooms2/${roomCode}`), snap => {
      if (!snap.exists()) { leaveRoom(); return; }
      const data = snap.val();
      if (myRole === 'X' && data.status === 'playing' && document.getElementById('waiting').style.display !== 'none') {
        show('game');
        initGameUI();
      }
      if (document.getElementById('game').style.display !== 'none') {
        renderGame(data);
        handleEmojiUpdate(data.emoji);
      }
    });
  }

  function initGameUI() {
    document.getElementById('room-badge-code').textContent = roomCode;
    document.getElementById('role-label-1').textContent = `שחקן 1 ${myRole === 'X' ? '(אתה 🍓)' : '(יריב 🍓)'}`;
    document.getElementById('role-label-2').textContent = `שחקן 2 ${myRole === 'O' ? '(אתה 🍋)' : '(יריב 🍋)'}`;
  }

  // ─── Render ───
  function renderGame(data) {
    const round = data.round || {};
    const scores = round.scores || { X: 0, O: 0 };
    lastScores = scores;

    document.getElementById('score-1').textContent = scores.X;
    document.getElementById('score-2').textContent = scores.O;

    const phase = round.phase || 'shuffling';
    const picks = round.picks || {};
    const myPick = picks[myRole];
    const bothPicked = picks.X !== undefined && picks.O !== undefined;

    // Score cards highlight
    document.getElementById('score-card-1').classList.toggle('active-turn', phase === 'picking' && !picks.X);
    document.getElementById('score-card-2').classList.toggle('active-turn', phase === 'picking' && !picks.O);

    // Tries labels
    const triesText = (role) => {
      if (phase === 'picking') return picks[role] !== undefined ? '✓ בחר' : 'בוחר...';
      return '';
    };
    document.getElementById('tries-1').textContent = triesText('X');
    document.getElementById('tries-2').textContent = triesText('O');

    // Status
    const statusEl = document.getElementById('status-area');
    if (phase === 'shuffling') {
      statusEl.innerHTML = `<div class="status-pill">🔀 מערבב...</div>`;
      if (!isShuffling) startShuffleAnimation(round);
    } else if (phase === 'picking') {
      isShuffling = false;
      const myTurn = picks[myRole] === undefined;
      statusEl.innerHTML = myTurn
        ? `<div class="status-pill">👆 בחר כוס!</div>`
        : `<div class="status-pill">⏳ ממתין לחבר...</div>`;
    } else if (phase === 'revealed') {
      isShuffling = false;
      statusEl.innerHTML = '';
    }

    // Cups
    renderCups(round, phase, picks, bothPicked);

    // Next round button — show only after both picked
    document.getElementById('next-btn').style.display = bothPicked && phase === 'revealed' ? 'inline-block' : 'none';
    document.getElementById('shuffle-msg').textContent = '';
  }

  function renderCups(round, phase, picks, bothPicked) {
    for (let i = 0; i < 2; i++) {
      const cup = document.getElementById(`cup-${i}`);
      cup.className = 'cup';
      cup.innerHTML = '';

      if (phase === 'shuffling') {
        // show question marks, not clickable
      } else if (phase === 'picking') {
        const canPick = picks[myRole] === undefined;
        if (canPick) cup.classList.add('clickable');
        if (picks[myRole] === i) {
          cup.style.borderColor = 'rgba(124,58,237,0.8)';
          cup.style.boxShadow = '0 0 20px rgba(124,58,237,0.4)';
          cup.innerHTML = '<span style="font-size:1.5rem">✓</span>';
        }
      } else if (phase === 'revealed') {
        // Reveal all
        if (i === round.hiddenCup) {
          cup.classList.add('revealed', 'winner-cup');
          const img = document.createElement('img');
          img.src = IMAGES[round.prize];
          img.alt = round.prize;
          cup.appendChild(img);
        } else {
          cup.classList.add('empty-revealed');
        }
        // Mark picked cups
        if (picks.X === i || picks.O === i) {
          cup.style.outline = '3px solid rgba(255,255,255,0.3)';
          cup.style.outlineOffset = '3px';
        }
      }
    }

    // Show result if revealed
    if (phase === 'revealed') {
      const statusEl = document.getElementById('status-area');
      const myPick = picks[myRole];
      const found = myPick === round.hiddenCup;
      const pts = found ? PRIZES[round.prize] : 0;
      if (found) {
        statusEl.innerHTML = `<div class="status-win">🎉 מצאת! +${pts} נקודות</div>`;
      } else {
        statusEl.innerHTML = `<div class="status-pill" style="color:rgba(255,100,100,0.8)">😔 לא מצאת</div>`;
      }
    }
  }

  // ─── Shuffle animation ───
  function startShuffleAnimation(round) {
    if (isShuffling) return;
    isShuffling = true;

    const shuffleClasses = ['shuffle-left','shuffle-right','shuffle-cross'];
    let count = 0;
    const total = 4 + Math.floor(Math.random() * 3); // 4-6 shuffles

    const doShuffle = () => {
      if (!isShuffling) return;
      if (count >= total) {
        // Both players independently move to picking after shuffle ends
        update(ref(db, `rooms2/${roomCode}/round`), { phase: 'picking' });
        return;
      }
      for (let i = 0; i < 2; i++) {
        const cup = document.getElementById(`cup-${i}`);
        cup.className = 'cup';
        void cup.offsetWidth;
        cup.classList.add(shuffleClasses[Math.floor(Math.random() * shuffleClasses.length)]);
      }
      count++;
      setTimeout(doShuffle, 450);
    };
    setTimeout(doShuffle, 300);
  }

  // ─── Pick cup ───
  window.pickCup = async function(i) {
    const snap = await get(ref(db, `rooms2/${roomCode}/round`));
    const round = snap.val();
    if (!round || round.phase !== 'picking') return;
    if (round.picks && round.picks[myRole] !== undefined) return;

    const updates = {};
    updates[`picks/${myRole}`] = i;

    // Update scores
    const found = i === round.hiddenCup;
    if (found) {
      const newScores = { ...lastScores };
      newScores[myRole] = (newScores[myRole] || 0) + PRIZES[round.prize];
      updates['scores'] = newScores;
      lastScores = newScores;
    }

    await update(ref(db, `rooms2/${roomCode}/round`), updates);

    // Check if both picked now — reveal
    const snap2 = await get(ref(db, `rooms2/${roomCode}/round`));
    const updated = snap2.val();
    if (updated && updated.picks && updated.picks.X !== undefined && updated.picks.O !== undefined) {
      await update(ref(db, `rooms2/${roomCode}/round`), { phase: 'revealed' });
    }
  };

  // ─── Next round ───
  window.requestNextRound = async function() {
    const round = newRoundState();
    round.scores = lastScores;
    await update(ref(db, `rooms2/${roomCode}`), { round });
    isShuffling = false;
  };

  // ─── Emoji ───
  window.sendEmoji = async function(emoji) {
    await update(ref(db, `rooms2/${roomCode}/emoji`), { value: emoji, from: myRole, ts: Date.now() });
  };

  function handleEmojiUpdate(emojiData) {
    if (!emojiData || !emojiData.ts) return;
    if (emojiData.ts <= lastEmojiTs) return;
    lastEmojiTs = emojiData.ts;
    const isMe = emojiData.from === myRole;
    const el = document.createElement('div');
    el.className = 'emoji-bubble ' + (isMe ? 'mine' : 'theirs');
    el.textContent = emojiData.value;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }

  // ─── Leave ───
  window.leaveRoom = async function() {
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    if (roomCode) { await remove(ref(db, `rooms2/${roomCode}`)); roomCode = null; }
    myRole = null; isShuffling = false;
    document.getElementById('lobby-err').textContent = '';
    history.replaceState({}, '', location.pathname);
    show('lobby');
  };

  // ─── Auto-join from URL ───
  (async function() {
    const params = new URLSearchParams(location.search);
    const roomParam = params.get('room');
    if (!roomParam) return;
    const snap = await get(ref(db, `rooms2/${roomParam}`));
    const errEl = document.getElementById('lobby-err');
    if (!snap.exists()) { errEl.textContent = 'החדר לא נמצא'; history.replaceState({}, '', location.pathname); return; }
    if (snap.val().status !== 'waiting') { errEl.textContent = 'החדר כבר מלא'; history.replaceState({}, '', location.pathname); return; }
    await update(ref(db, `rooms2/${roomParam}`), { status: 'playing' });
    roomCode = roomParam;
    myRole = 'O';
    history.replaceState({}, '', location.pathname);
    show('game');
    initGameUI();
    listenRoom();
  })();
</script>
</body>
</html>
